<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery Postcode Checker</title>
<style>
  .delivery-checker-container {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    max-width: 480px;
    margin: 2rem auto;
    padding: 2rem;
    border-radius: 12px;
    background: #ffffff;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    border: 1px solid #eaecef;
    text-align: center;
  }
  .delivery-checker-container h2 {
    margin-top: 0;
    color: #24292e;
    font-size: 1.5rem;
    font-weight: 600;
  }
  .delivery-checker-container p {
    color: #586069;
    font-size: 0.95rem;
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }
  .input-group {
    display: flex;
    gap: 10px;
    margin-bottom: 1.2rem;
  }
  .input-group input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid #d1d5da;
    border-radius: 8px;
    font-size: 1rem;
    outline: none;
    transition: all 0.2s ease;
  }
  .input-group input:focus {
    border-color: #0366d6;
    box-shadow: 0 0 0 3px rgba(3, 102, 214, 0.15);
  }
  .input-group button {
    padding: 12px 24px;
    background-color: #0366d6;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: background-color 0.2s ease;
  }
  .input-group button:hover {
    background-color: #005cc5;
  }
  #result-message {
    padding: 1rem;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 500;
    display: none;
    transition: all 0.3s ease;
    text-align: left;
  }
  .result-success {
    background-color: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
  }
  .result-warning {
    background-color: #fff3cd;
    color: #856404;
    border: 1px solid #ffeeba;
  }
  .result-error {
    background-color: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
  }
</style>
</head>
<body>

<div class="delivery-checker-container">
  <h2>Check Delivery Options</h2>
  <p>Enter your full postcode below to see our available delivery services for your area.</p>
  
  <div class="input-group">
    <input type="text" id="postcodeInput" placeholder="e.g. AB10 1AA">
    <button id="searchButton">Search</button>
  </div>
  
  <div id="result-message"></div>
</div>

function showResult(text, type) {
  const resultDiv = document.getElementById('result-message');
  if (resultDiv) {
    resultDiv.style.display = 'block';
    resultDiv.textContent = text;
    resultDiv.className = type;
  }
}

function checkDelivery() {
  const inputEl = document.getElementById('postcodeInput');
  if (!inputEl) return;
  
  let input = inputEl.value;
  let formattedInput = input.toUpperCase().replace(/\s+/g, '');
  
  if (!formattedInput) {
    showResult("Please enter a valid UK postcode.", "result-error");
    return;
  }

  let area = "";
  let outcode = "";
  
  const match = formattedInput.match(/^([A-Z]{1,2})(\d[A-Z\d]?)/);
  if (match) {
    area = match[1];
    outcode = match[1] + match[2];
  } else {
    area = formattedInput.replace(/[^A-Z]/g, '');
    outcode = formattedInput;
  }

  if (noNextDay.includes(outcode) || noNextDay.includes(area)) {
    showResult("We do not offer any next day delivery option for this postcode.", "result-error");
    return;
  }

  if (altExpress.includes(outcode) || altExpress.includes(area)) {
    showResult("We can offer an alternate express delivery option with Royal Mail. Orders must be placed before 2pm.", "result-warning");
    return;
  }

  showResult("Great! Standard next day delivery service is available for your area.", "result-success");
}

// Safely attach event listeners using Javascript after elements load
const searchBtn = document.getElementById('searchButton');
const postcodeInput = document.getElementById('postcodeInput');

if (searchBtn) {
  searchBtn.addEventListener('click', checkDelivery);
}
if (postcodeInput) {
  postcodeInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      checkDelivery();
    }
  });
}
</script>
